<svg viewBox="0 0 1000 540" xmlns="http://www.w3.org/2000/svg" role="img" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif">
  <title>How Eyil Guard reaches a verdict</title>
  <desc>A file open is intercepted by the kernel minifilter, sent to the local engine, checked against five detection layers fed by auto-updating threat intel, and the verdict is shown in the dashboard.</desc>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#9A93C9"/>
    </marker>
  </defs>
  <rect x="1" y="1" width="998" height="538" rx="18" fill="#FBFAFF" stroke="#E6E3F5"/>
  <text x="500" y="42" text-anchor="middle" font-size="23" font-weight="800" fill="#2E2A4F">How a file gets a verdict</text>

  <text x="500" y="80" text-anchor="middle" font-size="12.5" font-weight="700" letter-spacing="2" fill="#6B6790">FIVE DETECTION LAYERS</text>
  <g font-size="13.5" font-weight="600" fill="#2E2A4F" text-anchor="middle">
    <rect x="70"  y="92" width="150" height="44" rx="12" fill="#FFFFFF" stroke="#D9D4F2"/><text x="145" y="119">ClamAV</text>
    <rect x="248" y="92" width="150" height="44" rx="12" fill="#FFFFFF" stroke="#D9D4F2"/><text x="323" y="119">YARA ~5,900</text>
    <rect x="426" y="92" width="150" height="44" rx="12" fill="#FFFFFF" stroke="#D9D4F2"/><text x="501" y="119">Hash blocklist</text>
    <rect x="604" y="92" width="150" height="44" rx="12" fill="#FFFFFF" stroke="#D9D4F2"/><text x="679" y="119">Behavioral</text>
    <rect x="782" y="92" width="150" height="44" rx="12" fill="#FFFFFF" stroke="#D9D4F2"/><text x="857" y="119">Network C2</text>
  </g>
  <g stroke="#C9C3EE" stroke-width="2" fill="none">
    <path d="M145 136 V166"/><path d="M323 136 V166"/><path d="M501 136 V166"/><path d="M679 136 V166"/><path d="M857 136 V166"/>
    <path d="M145 166 H857"/>
    <path d="M501 166 V216" marker-end="url(#arr)"/>
  </g>

  <g text-anchor="middle">
    <rect x="40" y="240" width="150" height="56" rx="12" fill="#FFFFFF" stroke="#D9D4F2"/>
    <text x="115" y="264" font-size="13.5" font-weight="600" fill="#2E2A4F">A file opens</text>
    <text x="115" y="282" font-size="13.5" font-weight="600" fill="#2E2A4F">or runs</text>

    <rect x="248" y="228" width="155" height="80" rx="14" fill="#7B6CF6"/>
    <text x="325" y="262" font-size="15" font-weight="800" fill="#FFFFFF">Kernel minifilter</text>
    <text x="325" y="285" font-size="12" fill="#E9E5FF">blocks pre-execution</text>

    <rect x="423" y="228" width="155" height="80" rx="14" fill="#7B6CF6"/>
    <text x="500" y="262" font-size="15" font-weight="800" fill="#FFFFFF">Engine</text>
    <text x="500" y="285" font-size="12" fill="#E9E5FF">verdicts · local-only</text>

    <rect x="800" y="228" width="160" height="80" rx="14" fill="#7B6CF6"/>
    <text x="880" y="262" font-size="15" font-weight="800" fill="#FFFFFF">Eyil dashboard</text>
    <text x="880" y="285" font-size="12" fill="#E9E5FF">Simple / Technical</text>
  </g>
  <g stroke="#9A93C9" stroke-width="2" fill="none">
    <path d="M190 268 H246" marker-end="url(#arr)"/>
    <path d="M403 268 H421" marker-end="url(#arr)"/>
    <path d="M578 268 H798" marker-end="url(#arr)"/>
  </g>
  <text x="688" y="258" text-anchor="middle" font-size="11.5" fill="#6B6790">plain-language verdict</text>

  <rect x="410" y="356" width="180" height="54" rx="13" fill="#FFFFFF" stroke="#5FBF9B"/>
  <rect x="410" y="356" width="6" height="54" rx="3" fill="#5FBF9B"/>
  <text x="503" y="380" text-anchor="middle" font-size="13.5" font-weight="700" fill="#2E2A4F">abuse.ch + freshclam</text>
  <text x="503" y="398" text-anchor="middle" font-size="11.5" fill="#6B6790">auto-updating intel</text>
  <path d="M500 356 V310" stroke="#9A93C9" stroke-width="2" fill="none" marker-end="url(#arr)"/>

  <g font-size="12.5" fill="#6B6790">
    <rect x="300" y="470" width="16" height="16" rx="4" fill="#7B6CF6"/>
    <text x="324" y="483">built here (ours)</text>
    <rect x="470" y="470" width="16" height="16" rx="4" fill="#FFFFFF" stroke="#D9D4F2"/>
    <text x="494" y="483">composed (ClamAV · YARA · abuse.ch)</text>
  </g>
</svg>
